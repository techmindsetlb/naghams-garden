<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌻 Nagham's Productivity Garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@400;500;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header" id="sidebarHeader">
      <!-- Rendered by JS -->
    </div>

    <!-- NAVIGATION -->
    <div class="sidebar-nav">
      <button class="sidebar-nav-item active" data-view="tasks" onclick="switchView('tasks')">
        <i class="fa-solid fa-list-check"></i>
        <span>Tasks</span>
      </button>
      <button class="sidebar-nav-item" data-view="calendar" onclick="switchView('calendar')">
        <i class="fa-solid fa-calendar-days"></i>
        <span>Calendar</span>
      </button>
      <button class="sidebar-nav-item" data-view="focus" onclick="switchView('focus')">
        <i class="fa-solid fa-seedling"></i>
        <span>Focus</span>
      </button>
    </div>

    <!-- BOARD SECTION (only shown in tasks view) -->
    <div class="sidebar-boards" id="sidebarBoards">
      <div class="sidebar-label">
        Boards
        <button class="sidebar-settings-btn" onclick="openSettings()" title="Customize Theme"><i class="fa-solid fa-palette"></i></button>
      </div>
      <div class="boards-list" id="boardList"></div>
      <button class="add-board-btn" onclick="addBoard()">
        <i class="fa-solid fa-plus"></i>
        <span>New Board</span>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast-c" id="toastC"></div>

<script src="js/app.js"></script>
</body>
</html>
